apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-hugepages-2mi
  namespace: vm-tuning-lab
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-hugepages-2mi
    spec:
      # For a fair comparison, pin both VMs to the SAME node that has the
      # hugepage pool reserved. Uncomment and set your node:
      # nodeSelector:
      #   kubernetes.io/hostname: <your-node>
      domain:
        cpu:
          cores: 4
        memory:
          guest: 6Gi
          hugepages:
            pageSize: 2Mi
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
          - disk:
              bus: virtio
            name: cloudinit
      volumes:
      - containerDisk:
          image: quay.io/containerdisks/fedora:41
        name: rootdisk
      - cloudInitNoCloud:
          # Installs qemu-guest-agent + gcc, drops bench/pointer-chase.c at
          # /root/pc.c (base64) and compiles it to /usr/local/bin/pc at boot.
          userDataBase64: 
        name: cloudinit
