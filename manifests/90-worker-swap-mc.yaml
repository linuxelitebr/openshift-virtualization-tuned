apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 90-worker-swap
  labels:
    machineconfiguration.openshift.io/role: worker
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /usr/local/bin/provision-swap.sh
          mode: 493
          overwrite: true
          contents:
            source: "data:text/plain;charset=utf-8;base64,"
    systemd:
      units:
        - name: swap-provision.service
          enabled: true
          contents: |
            [Unit]
            Description=Provision and enable swap (size-checked, fail-safe)
            ConditionFirstBoot=no
            ConditionPathExists=!/var/tmp/swapfile

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/provision-swap.sh

            [Install]
            RequiredBy=kubelet-dependencies.target
        - name: cgroup-system-slice-config.service
          enabled: true
          contents: |
            [Unit]
            Description=Restrict swap for system slice (fail-safe)
            ConditionFirstBoot=no

            [Service]
            Type=oneshot
            ExecStart=/bin/sh -c "systemctl set-property --runtime system.slice MemorySwapMax=0 || true; exit 0"

            [Install]
            RequiredBy=kubelet-dependencies.target
